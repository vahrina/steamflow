body:
  - type: textBlock
    attributes:
      name: help_command_label
      description: "toggle the visibility of following options"

  - type: checkbox
    attributes:
      name: show_help_api
      label: "api"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_switch
      label: "switch"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_status
      label: "status"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_wishlist
      label: "wishlist"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_settings
      label: "settings"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_clear
      label: "clear"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_restart
      label: "restart"
      defaultValue: true

  - type: checkbox
    attributes:
      name: show_help_exit
      label: "exit"
      defaultValue: true

  - type: input
    attributes:
      name: settings_tree_opener_exe
      label: "open `tree.md` with preferred app"
      description: "full path to an editor/viewer exe"
      defaultValue: ""

  - type: input
    attributes:
      name: blacklisted_app_ids
      label: "hidden apps"
      description: "comma separated list of app ids to hide\n[def: steamw. comm. redis. (228980)]"
      defaultValue: "228980"

  - type: checkbox
    attributes:
      name: enable_perf_logging
      label: "[debug] enable perf logging"
      description: "log slow query stages & network calls to `plugin_steamflow.log`"
      defaultValue: false
